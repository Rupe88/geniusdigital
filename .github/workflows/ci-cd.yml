name: CI / CD

# Default: build + push to GHCR. The droplet deploys by **pulling :latest** on a cron (see deploy/PULL-DEPLOY.md).
# Inbound SSH from GitHub Actions is unreliable; we do not require it for a green pipeline.
# Optional: set repo Variable DEPLOY_USE_SSH=true to run the legacy SSH/rsync deploy job.

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build (PR verification)
        if: github.event_name == 'pull_request'
        run: npm run build

  publish-image:
    needs: lint
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || vars.NEXT_PUBLIC_API_URL || 'https://api.geniusdigi.com/api' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || vars.NEXT_PUBLIC_APP_URL || 'https://geniusshiksha.com' }}

    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase for GHCR)
        id: meta
        run: |
          IMG="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image_ref=${IMG}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMG}:latest" >> "$GITHUB_OUTPUT"
          echo "Building ${IMG}@${{ github.sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ steps.meta.outputs.image_latest }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Always succeeds — documents pull-based deploy (no SSH from GitHub required).
  droplet-rollout:
    needs: publish-image
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Image published — apply on droplet via cron pull
        run: |
          echo "::notice::GHCR image (immutable tag): ${{ needs.publish-image.outputs.image_ref }}"
          echo "::notice::CI also pushed :latest — droplet should use FRONTEND_IMAGE=...:latest in .env.deploy"
          echo "::notice::Setup: deploy/PULL-DEPLOY.md (cron pull — no SSH from Actions)."

  deploy-via-ssh:
    needs: publish-image
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      vars.DEPLOY_USE_SSH == 'true'
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH || '/var/www/geniusdigital-frontend' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER || 'root' }}
      DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT || vars.DEPLOY_SSH_PORT }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || vars.NEXT_PUBLIC_API_URL || 'https://api.geniusdigi.com/api' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || vars.NEXT_PUBLIC_APP_URL || 'https://geniusshiksha.com' }}
      FRONTEND_IMAGE: ${{ needs.publish-image.outputs.image_ref }}
      GITHUB_OWNER: ${{ github.repository_owner }}
      # Set repository Variable DEPLOY_SSH_FORCE_IPV4=true if IPv6/AAAA breaks SSH from GitHub.
      DEPLOY_SSH_FORCE_IPV4: ${{ vars.DEPLOY_SSH_FORCE_IPV4 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight — TCP reachability to SSH port
        run: |
          set -euo pipefail
          PORT="${DEPLOY_SSH_PORT:-22}"
          echo "Checking TCP ${DEPLOY_HOST}:${PORT} from GitHub Actions (public runner)..."
          if timeout 25 bash -c "echo >/dev/tcp/${DEPLOY_HOST}/${PORT}" 2>/dev/null; then
            echo "TCP connect OK"
          else
            echo "::error::Cannot reach ${DEPLOY_HOST}:${PORT} (TCP) from this runner."
            echo "::error::Fix: DigitalOcean → Networking → Firewalls — allow **Inbound SSH (22/tcp)** from **All IPv4 addresses** (0.0.0.0/0) and **All IPv6** (::/0), or detach the firewall from this droplet for testing."
            echo "::error::On the droplet: sudo ufw allow 22/tcp && sudo ufw reload"
            echo "::error::GitHub Actions uses a **new IP every run** — you cannot whitelist a single IP."
            exit 1
          fi

      - name: Configure SSH and deploy (retries; no fragile heredocs on the runner)
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          set -euo pipefail

          KEY_CONTENT="${DEPLOY_SSH_KEY:-}"
          if [ -z "$KEY_CONTENT" ]; then KEY_CONTENT="${SSH_PRIVATE_KEY:-}"; fi
          if [ -z "$KEY_CONTENT" ]; then
            echo "::error::Set repository secret DEPLOY_SSH_KEY (or SSH_PRIVATE_KEY)"
            exit 1
          fi
          if [ -z "${DEPLOY_HOST:-}" ] || [ -z "${DEPLOY_PATH:-}" ]; then
            echo "::error::Set DEPLOY_HOST and DEPLOY_PATH"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          PORT="${DEPLOY_SSH_PORT:-22}"

          # One TCP attempt per ssh invocation — retry() adds backoff (avoids sshd MaxStartups / fail2ban bursts).
          SSH_OPTS=(-i ~/.ssh/deploy_key
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=60
            -o ConnectionAttempts=1
            -o TCPKeepAlive=yes
            -o ServerAliveInterval=20
            -o ServerAliveCountMax=8
            -p "$PORT")
          if [ "${DEPLOY_SSH_FORCE_IPV4:-}" = "true" ] || [ "${DEPLOY_SSH_FORCE_IPV4:-}" = "1" ]; then
            SSH_OPTS=(-4 "${SSH_OPTS[@]}")
            echo "Using IPv4 only (DEPLOY_SSH_FORCE_IPV4)"
          fi

          KEYSCAN_FLAGS=(-p "$PORT" -H "$DEPLOY_HOST")
          if [ "${DEPLOY_SSH_FORCE_IPV4:-}" = "true" ] || [ "${DEPLOY_SSH_FORCE_IPV4:-}" = "1" ]; then
            KEYSCAN_FLAGS=(-4 "${KEYSCAN_FLAGS[@]}")
          fi
          ssh-keyscan "${KEYSCAN_FLAGS[@]}" >> ~/.ssh/known_hosts 2>/dev/null || true

          printf -v RSYNC_RSH '%q ' ssh "${SSH_OPTS[@]}"
          RSYNC_RSH="${RSYNC_RSH% }"

          SSH_BASE=(ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}")

          retry() {
            local attempt=1 max=6 delay=6
            while [ "$attempt" -le "$max" ]; do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -eq "$max" ]; then
                echo "::error::Command failed after $max attempts: $*"
                return 1
              fi
              echo "::warning::Attempt $attempt/$max failed; retrying in ${delay}s..."
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay + 5))
            done
          }

          printf '%s\n' \
            "FRONTEND_IMAGE=${FRONTEND_IMAGE}" \
            "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}" \
            "NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}" \
            > /tmp/frontend.env.deploy

          echo "Ensure deploy directory exists..."
          retry "${SSH_BASE[@]}" "mkdir -p '${DEPLOY_PATH}'"

          echo "Rsync compose + env + script..."
          retry rsync -avz --timeout=120 -e "$RSYNC_RSH" docker-compose.prod.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
          retry rsync -avz --timeout=120 -e "$RSYNC_RSH" docker-compose.build.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/" || true
          retry rsync -avz --timeout=120 -e "$RSYNC_RSH" /tmp/frontend.env.deploy "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/.env.deploy"
          retry rsync -avz --timeout=120 -e "$RSYNC_RSH" deploy/scripts/droplet-compose-up.sh "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/droplet-compose-up.sh"
          retry "${SSH_BASE[@]}" "chmod +x '${DEPLOY_PATH}/droplet-compose-up.sh'"

          if [ -n "${GHCR_READ_TOKEN:-}" ]; then
            echo "GHCR login (private package)..."
            U="${GHCR_USERNAME:-${GITHUB_OWNER}}"
            attempt=1
            max=6
            delay=6
            while [ "$attempt" -le "$max" ]; do
              if printf '%s' "$GHCR_READ_TOKEN" | "${SSH_BASE[@]}" docker login ghcr.io -u "$U" --password-stdin; then
                break
              fi
              if [ "$attempt" -eq "$max" ]; then
                echo "::error::docker login failed after $max attempts"
                exit 1
              fi
              echo "::warning::docker login attempt $attempt/$max failed; retrying in ${delay}s..."
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay + 5))
            done
          fi

          echo "docker compose pull + up..."
          retry "${SSH_BASE[@]}" "DEPLOY_PATH='${DEPLOY_PATH}' bash '${DEPLOY_PATH}/droplet-compose-up.sh'"
