name: CI / CD

# Fast path: Docker image is built on GitHub Actions (BuildKit + GHA cache), pushed to GHCR.
# The droplet only pulls + restarts (~1–2 min). No npm/next build on the VPS.
#
# Secrets/Variables: DEPLOY_*, DEPLOY_SSH_KEY, NEXT_PUBLIC_* (see deploy/DROPLET.md).
# Optional: GHCR_READ_TOKEN (+ GHCR_USERNAME) if the GHCR package is private.

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Full Next build on PRs only — pushes to main rely on the Docker build (faster CI + no duplicate work).
      - name: Production build (PR verification)
        if: github.event_name == 'pull_request'
        run: npm run build

  publish-image:
    needs: lint
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || vars.NEXT_PUBLIC_API_URL || 'https://api.geniusdigi.com/api' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || vars.NEXT_PUBLIC_APP_URL || 'https://geniusshiksha.com' }}

    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase for GHCR)
        id: meta
        run: |
          IMG="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image_ref=${IMG}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMG}:latest" >> "$GITHUB_OUTPUT"
          echo "Building ${IMG}@${{ github.sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ steps.meta.outputs.image_latest }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: publish-image
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH || '/var/www/geniusdigital-frontend' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER || 'root' }}
      DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT || vars.DEPLOY_SSH_PORT }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || vars.NEXT_PUBLIC_API_URL || 'https://api.geniusdigi.com/api' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || vars.NEXT_PUBLIC_APP_URL || 'https://geniusshiksha.com' }}
      FRONTEND_IMAGE: ${{ needs.publish-image.outputs.image_ref }}
      GITHUB_OWNER: ${{ github.repository_owner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEY_CONTENT="${DEPLOY_SSH_KEY:-}"
          if [ -z "$KEY_CONTENT" ]; then KEY_CONTENT="${SSH_PRIVATE_KEY:-}"; fi
          if [ -z "$KEY_CONTENT" ]; then
            echo "::error::Set repository secret DEPLOY_SSH_KEY (or SSH_PRIVATE_KEY)"
            exit 1
          fi
          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "::error::Set DEPLOY_HOST"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${DEPLOY_SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync compose files to droplet
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_PATH:-}" ]; then
            echo "::error::Set DEPLOY_PATH"
            exit 1
          fi
          PORT="${DEPLOY_SSH_PORT:-22}"
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p $PORT"
          rsync -avz -e "$RSYNC_SSH" docker-compose.prod.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
          rsync -avz -e "$RSYNC_SSH" docker-compose.build.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/" || true

      - name: Write .env.deploy on droplet
        run: |
          set -euo pipefail
          PORT="${DEPLOY_SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p "$PORT" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail; umask 077; mkdir -p \"${DEPLOY_PATH}\"; tee \"${DEPLOY_PATH}/.env.deploy\" > /dev/null" <<EOF
          FRONTEND_IMAGE=${FRONTEND_IMAGE}
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
          EOF

      - name: Pull image and restart containers
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p "$PORT" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s <<REMOTE_SCRIPT
          set -euo pipefail
          if [ -n "${GHCR_READ_TOKEN:-}" ]; then
            echo "${GHCR_READ_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME:-${GITHUB_OWNER}}" --password-stdin
          fi
          cd "${DEPLOY_PATH}"
          docker compose -f docker-compose.prod.yml --env-file .env.deploy pull
          docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --remove-orphans
          REMOTE_SCRIPT
