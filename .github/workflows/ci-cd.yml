name: CI / CD

# Assumes this workflow lives at the frontend repo root. If the app is in a monorepo subfolder,
# add defaults.run.working-directory and point DEPLOY_PATH/rsync at that directory.
#
# Deploy config (host, path, user) can live in EITHER:
#   Repository secrets (Settings → Secrets and variables → Actions → Secrets), OR
#   Repository variables (Settings → Secrets and variables → Actions → Variables)
# Secrets take precedence when both are set. Key must stay in DEPLOY_SSH_KEY (secret).

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    needs: lint-and-build
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    env:
      # Prefer secrets; fall back to repo Variables; then optional defaults (path/user only).
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH || '/var/www/geniusdigital-frontend' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER || 'root' }}
      DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT || vars.DEPLOY_SSH_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEY_CONTENT="${DEPLOY_SSH_KEY:-}"
          if [ -z "$KEY_CONTENT" ]; then KEY_CONTENT="${SSH_PRIVATE_KEY:-}"; fi
          if [ -z "$KEY_CONTENT" ]; then
            echo "::error::Set repository secret DEPLOY_SSH_KEY (or SSH_PRIVATE_KEY) — same PEM as genius-digital-backend"
            exit 1
          fi
          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "::error::Set DEPLOY_HOST as a repository Secret or Variable (e.g. 64.227.182.187)"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${DEPLOY_SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync to droplet
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_PATH:-}" ]; then
            echo "::error::DEPLOY_PATH is empty — set repository Secret or Variable DEPLOY_PATH"
            exit 1
          fi
          PORT="${DEPLOY_SSH_PORT:-22}"
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p $PORT"
          rsync -avz --delete \
            -e "$RSYNC_SSH" \
            --exclude node_modules \
            --exclude .next \
            --exclude .git \
            --exclude .env \
            --exclude .env.local \
            --exclude .env.deploy \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Build and restart containers
        run: |
          set -euo pipefail
          PORT="${DEPLOY_SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p "$PORT" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s <<REMOTE_SCRIPT
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --build --remove-orphans
          REMOTE_SCRIPT
