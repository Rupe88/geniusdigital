# Production: image is built in GitHub Actions (GHCR) and pulled on the droplet — fast deploy.
# Set FRONTEND_IMAGE in .env.deploy (CI writes it). Runtime env still uses NEXT_PUBLIC_* from .env.deploy.
#
# Local full build (no registry): use docker-compose.build.yml instead.

services:
  web:
    image: ${FRONTEND_IMAGE:?set FRONTEND_IMAGE in .env.deploy e.g. ghcr.io/org/repo:sha}
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
